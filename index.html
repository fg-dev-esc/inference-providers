<!DOCTYPE html>
<html lang="es" data-theme="dark">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>xhigh</title>
  <link rel="icon" href="/favicon.svg?v=2" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@400;500&family=Geist:wght@300;400;500;600&display=swap"
    rel="stylesheet">

    href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.10.0/styles/atom-one-dark.min.css">

<body>
  <div class="app">

    <header class="topbar">
      <div class="topbar-left">
        <button class="icon-btn" id="drawerBtn" aria-label="Conversaciones" title="Conversaciones">
          <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="3" width="18" height="18" rx="2"/><path d="M9 3v18"/>
          </svg>
        </button>

        <div class="model-selector-wrap">
          <button class="model-btn" id="modelBtn" aria-haspopup="listbox" aria-expanded="false"
            aria-label="Seleccionar modelo">
            <i data-lucide="brain" width="16" height="16" id="modelIcon"></i>
            <span class="model-label" id="modelLabel">Seleccionar modelo</span>
            <svg class="chevron" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
              stroke-width="2.5">
              <path d="M6 9l6 6 6-6" />
            </svg>
          </button>
          <div class="model-dropdown" id="modelDropdown" role="listbox">
            <div class="dropdown-search">
              <input type="text" id="modelSearch" placeholder="Buscar modelo…" autocomplete="off"
                aria-label="Buscar modelo">
            </div>
            <div class="dropdown-body" id="dropdownBody"></div>
          </div>
        </div>
      </div>

      <div class="topbar-actions">
        <button class="icon-btn" id="clearBtn" aria-label="Nueva conversación" title="Nueva conversación">
          <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M12 5v14M5 12h14" />
          </svg>
        </button>
        <button class="icon-btn" id="themeBtn" aria-label="Cambiar tema" title="Cambiar tema">
          <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" />
          </svg>
        </button>
        <span class="db-status" id="dbStatus"></span>
      </div>
    </header>

    <main class="messages-wrap" id="messagesWrap" role="log" aria-live="polite">
      <div class="empty-state" id="emptyState">
        <div class="empty-icon">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z" />
          </svg>
        </div>
        <h2>.js</h2>
        <div class="empty-hints">
          <button class="hint-chip"
            data-prompt='
## Objetivo
Generar entre 5 y 8 snippets de JavaScript ejecutables en la consola del navegador con enfoque técnico-pedagógico, incluyendo:
- Explicación de conceptos (closures, prototipos, asincronía, etc.).
- Buenas prácticas.
- Errores comunes y cómo evitarlos.
- Comparación con alternativas equivalentes.
- Referencias útiles (MDN u otras).

---

## Temas a cubrir
Cada snippet debe tratar un tema distinto:
- Arrays (`map`, `filter`, `reduce` vs bucles).
- Objetos (`this`, prototipos, destructuring, métodos estáticos).
- DOM (selectores, atributos, eventos).
- Asincronía (`fetch`, `async/await`, `try/catch`).
- Funciones (closures, pure functions, parámetros por defecto).
- Eventos (delegación, `EventTarget`).
- Algoritmos simples.

---

## Estructura de cada snippet

### 1. Título
Ejemplo: `Arrays: reduce vs for`

### 2. Explicación técnica
- Qué problema resuelve.
- Conceptos clave.
- Diferencias frente a otras soluciones.

### 3. Código ejecutable
- Dentro de backticks.
- Comentarios técnicos inline.
- Salida esperada como comentario.

### 4. Buenas prácticas
Ejemplo:
- Evitar mutaciones.
- Manejo correcto de errores.
- Código legible e inmutable.

### 5. Errores comunes
Ejemplo:
- Olvidar asignar el resultado de `map`.
- No usar `await`.
- Mutar arrays accidentalmente.

### 6. Referencias
Links oficiales de MDN o recursos técnicos.

---

## Nivel técnico esperado
Profundizar en:
- Closures y scope.
- Event Loop.
- Prototipos vs `class`.
- Web APIs (`localStorage`, `IntersectionObserver`, etc.).
- Patrones de diseño básicos.

---

## Requisitos importantes
- Todo debe poder copiarse y ejecutarse directamente en la consola.
- Explicar el "por qué", no solo el "cómo".
- Priorizar claridad, legibilidad y buenas prácticas modernas.'>Ejercicios en consola
            </button>
        </div>
      </div>
    </main>

    <div class="input-area">
      <div class="image-attachments" id="imageAttachments">
        <div class="image-preview" id="imagePreview"></div>
        <span id="imageCounter"></span>
      </div>
      <div class="input-box">
        <input id="imageInput" type="file" accept="image/*" multiple hidden>
        <button class="image-btn" id="imageBtn" type="button" aria-label="Adjuntar imágenes" title="Adjuntar imágenes">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="3" width="18" height="18" rx="2"/>
            <circle cx="8.5" cy="8.5" r="1.5"/>
            <path d="M21 15l-5-5L5 21"/>
          </svg>
        </button>
        <textarea class="chat-input" id="chatInput" rows="1" placeholder="Escribe un mensaje…" aria-label="Mensaje"
          autocomplete="off" spellcheck="true"></textarea>
        <button class="send-btn" id="sendBtn" aria-label="Enviar" disabled>
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z" />
          </svg>
        </button>
      </div>
      <div class="input-footer">
        <span id="charCounter"></span>
      </div>
    </div>

    <div class="drawer-overlay" id="drawerOverlay"></div>
    <aside class="drawer" id="drawer">
      <div class="drawer-header">
        <h2>Conversaciones</h2>
        <button class="icon-btn" id="closeDrawerBtn" aria-label="Cerrar">
          <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M18 6L6 18M6 6l12 12" />
          </svg>
        </button>
      </div>
      <button class="new-chat-btn" id="newChatBtn">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M12 5v14M5 12h14" />
        </svg>
        Nueva conversación
      </button>
      <div class="drawer-search">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/>
        </svg>
        <input type="text" id="conversationSearch" placeholder="Buscar conversaciones…">
      </div>
      <div class="drawer-list" id="conversationList">
        <div class="drawer-empty">
          <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z" />
          </svg>
          <p>No hay conversaciones</p>
          <span>Crea una nueva para empezar</span>
        </div>
      </div>
    </aside>
  </div>

  <div class="toast" id="toast" role="alert"></div>

  <script>
    const STORAGE_KEY = 'inferencia_conversations';
    let conversations = [];
    let currentConversationId = null;

    const PROVIDERS = [
      { id: 'groq', name: 'Groq', color: '#a8b4f0' },
      { id: 'openrouter', name: 'OpenRouter', color: '#b4a0d4' },
      { id: 'google', name: 'Google', color: '#8ab4f8' },
      { id: 'mistral', name: 'Mistral', color: '#ffab91' },
      { id: 'sambanova', name: 'SambaNova', color: '#80cbc4' },
      { id: 'cohere', name: 'Cohere', color: '#a5d6a7' },
      { id: 'cerebras', name: 'Cerebras', color: '#ffcc80' },
    ];

    const MODELS = [
      { id: 'mistral-large-latest', label: 'Mistral Large 3', provider: 'mistral', tag: 'Mistral' },
      { id: 'DeepSeek-V3.1', label: 'DeepSeek V3.2', provider: 'sambanova', tag: 'SambaNova' },
      { id: 'qwen-3-235b-a22b-instruct-2507', label: 'Qwen 3 235B', provider: 'cerebras', tag: 'Cerebras' },
      { id: 'command-a-reasoning-08-2025', label: 'Command A Reasoning', provider: 'cohere', tag: 'Cohere' },
      { id: 'gemini-3-flash-preview', label: 'Gemini 3 Flash', provider: 'google', tag: 'Google' },
      { id: 'openai/gpt-oss-120b', label: 'GPT OSS 120B', provider: 'groq', tag: 'Groq' },
      { id: 'codestral-latest', label: 'Codestral', provider: 'mistral', tag: 'Mistral' },
      { id: 'openai/gpt-oss-20b', label: 'GPT OSS 20B', provider: 'groq', tag: 'Groq' },
      { id: 'mistral-small-latest', label: 'Mistral Small 4', provider: 'mistral', tag: 'Mistral' },
      { id: 'gemini-2.5-flash', label: 'Gemini 2.5 Flash', provider: 'google', tag: 'Google' },
      { id: 'open-mistral-nemo', label: 'Mistral NeMo', provider: 'mistral', tag: 'Mistral' },
      { id: 'openrouter/free', label: 'Auto Router', provider: 'openrouter', tag: 'OpenRouter' },
      { id: 'llama3.1-8b', label: 'Llama 3.1 8B', provider: 'cerebras', tag: 'Cerebras' },
    ];

    const ENDPOINTS = {
      groq: 'https://api.groq.com/openai/v1/chat/completions',
      openrouter: 'https://openrouter.ai/api/v1/chat/completions',
      google: 'https://generativelanguage.googleapis.com/v1beta/openai/chat/completions',
      mistral: 'https://api.mistral.ai/v1/chat/completions',
      sambanova: 'https://api.sambanova.ai/v1/chat/completions',
      cohere: 'https://api.cohere.com/compatibility/v1/chat/completions',
      cerebras: 'https://api.cerebras.ai/v1/chat/completions',
    };

    const MAX_IMAGES = 5;

    let selectedModel = MODELS.find(m => m.id === 'llama3.1-8b') || MODELS[0];
    let messages = [];
    let attachedImages = [];
    let isLoading = false;
    let currentTheme = 'dark';
    window.dbReady = false;

    const modelBtn = document.getElementById('modelBtn');
    const modelIcon = document.getElementById('modelIcon');
    const modelLabel = document.getElementById('modelLabel');
    const modelDropdown = document.getElementById('modelDropdown');
    const modelSearch = document.getElementById('modelSearch');
    const dropdownBody = document.getElementById('dropdownBody');
    const messagesWrap = document.getElementById('messagesWrap');
    const emptyState = document.getElementById('emptyState');
    const chatInput = document.getElementById('chatInput');
    const sendBtn = document.getElementById('sendBtn');
    const imageInput = document.getElementById('imageInput');
    const imageBtn = document.getElementById('imageBtn');
    const charCounter = document.getElementById('charCounter');
    const imageCounter = document.getElementById('imageCounter');
    const imagePreview = document.getElementById('imagePreview');
    const toastEl = document.getElementById('toast');
    const drawerBtn = document.getElementById('drawerBtn');
    const drawer = document.getElementById('drawer');
    const drawerOverlay = document.getElementById('drawerOverlay');
    const drawerList = document.getElementById('conversationList');
    const conversationSearch = document.getElementById('conversationSearch');
    const newChatBtn = document.getElementById('newChatBtn');
    const closeDrawerBtn = document.getElementById('closeDrawerBtn');

    function generateId() {
      return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, c => {
        const r = Math.random() * 16 | 0;
        return (c === 'x' ? r : (r & 0x3 | 0x8)).toString(16);
      });
    }

    function saveToLocalStorage() {
      try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(conversations));
      } catch (e) {
        console.warn('LocalStorage error:', e.message);
      }
    }

    function loadFromLocalStorage() {
      try {
        const stored = localStorage.getItem(STORAGE_KEY);
        conversations = stored ? JSON.parse(stored) : [];
      } catch (e) {
        conversations = [];
      }
      renderConversations();
    }

    async function initDB() {
      const statusEl = document.getElementById('dbStatus');

      try {
        const res = await fetch('/api/conversations');
        const data = await res.json();
        conversations = data.conversations || [];
        saveToLocalStorage();
        renderConversations();
        statusEl.textContent = '● Neon';
        statusEl.classList.add('connected');
        window.dbReady = true;
      } catch (e) {
        statusEl.textContent = '○ Local';
        loadFromLocalStorage();
        window.dbReady = false;
      }
    }

    async function syncToNeon(conv, action = 'upsert') {
      if (!window.dbReady) return;

      await fetch('/api/conversations', {
        method: action === 'delete' ? 'DELETE' : 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(conv)
      }).catch(() => {});
    }

    function createConversation() {
      const newConv = {
        id: generateId(),
        title: 'Nueva conversación',
        messages: [],
        created_at: new Date().toISOString(),
        updated_at: new Date().toISOString()
      };

      conversations.unshift(newConv);
      saveToLocalStorage();
      syncToNeon(newConv, 'upsert');
      currentConversationId = newConv.id;
      messages = [];
      messagesWrap.innerHTML = '';
      messagesWrap.appendChild(emptyState);
      emptyState.style.display = '';
      clearMessagesUI();
      renderConversations();
    }

    function updateConversation(id, title, msgs) {
      const idx = conversations.findIndex(c => c.id === id);
      if (idx !== -1) {
        const updated = { ...conversations[idx], title, messages: msgs, updated_at: new Date().toISOString() };
        conversations[idx] = updated;
        saveToLocalStorage();
        syncToNeon(updated, 'upsert');
      }
    }

    function deleteConversation(id) {
      const conv = conversations.find(c => c.id === id);
      if (conv) syncToNeon(conv, 'delete');
      conversations = conversations.filter(c => c.id !== id);
      saveToLocalStorage();
      if (currentConversationId === id) {
        currentConversationId = null;
        messages = [];
        clearMessagesUI();
      }
      renderConversations();
      showToast('Conversación eliminada');
    }

    function selectConversation(id) {
      const conv = conversations.find(c => c.id === id);
      if (!conv) return;
      currentConversationId = id;
      messages = conv.messages || [];
      renderMessages();
      closeDrawer();
    }

    function renderConversations(filter = '') {
      const filtered = conversations.filter(c => 
        c.title.toLowerCase().includes(filter.toLowerCase())
      );
      
      if (filtered.length === 0) {
        drawerList.innerHTML = `
          <div class="drawer-empty">
            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z" />
            </svg>
            <p>${filter ? 'No hay resultados' : 'No hay conversaciones'}</p>
            <span>${filter ? 'Prueba con otro término' : 'Crea una nueva para empezar'}</span>
          </div>
        `;
        return;
      }

      drawerList.innerHTML = filtered.map(conv => {
        const isActive = conv.id === currentConversationId;
        const date = new Date(conv.updated_at).toLocaleDateString('es', {
          month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit'
        });
        const msgCount = (conv.messages || []).length;
        
        return `
          <div class="conversation-item ${isActive ? 'active' : ''}" data-id="${conv.id}">
            <div class="conversation-content">
              <div class="conversation-title" data-id="${conv.id}">${conv.title}</div>
              <div class="conversation-meta">
                <span>${date}</span>
                <span class="msg-count">${msgCount} mensajes</span>
              </div>
            </div>
            <div class="conversation-actions">
              <button class="conv-action-btn edit" data-id="${conv.id}" title="Editar">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
                  <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9-9z"/>
                </svg>
              </button>
              <button class="conv-action-btn delete" data-id="${conv.id}" title="Eliminar">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M3 6h18M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
                </svg>
              </button>
            </div>
          </div>
        `;
      }).join('');

      drawerList.querySelectorAll('.conversation-item').forEach(item => {
        item.addEventListener('click', (e) => {
          if (!e.target.closest('.conv-action-btn')) {
            selectConversation(item.dataset.id);
          }
        });
      });

      drawerList.querySelectorAll('.conv-action-btn.edit').forEach(btn => {
        btn.addEventListener('click', (e) => {
          e.stopPropagation();
          const id = btn.dataset.id;
          const conv = conversations.find(c => c.id === id);
          if (!conv) return;
          const titleEl = drawerList.querySelector(`.conversation-item[data-id="${id}"] .conversation-title`);
          titleEl.contentEditable = true;
          titleEl.focus();
          titleEl.classList.add('editing');
          titleEl.dataset.editId = id;
        });
      });

      drawerList.addEventListener('blur', (e) => {
        if (e.target.classList.contains('conversation-title') && e.target.contentEditable === 'true') {
          const titleEl = e.target;
          titleEl.contentEditable = false;
          titleEl.classList.remove('editing');
          const id = titleEl.dataset.editId;
          const conv = conversations.find(c => c.id === id);
          if (!conv) return;
          const newTitle = titleEl.textContent.trim();
          if (newTitle && newTitle !== conv.title) {
            updateConversation(id, newTitle, conv.messages);
            renderConversations(conversationSearch.value.trim());
          } else {
            titleEl.textContent = conv.title;
          }
        }
      }, true);

      drawerList.addEventListener('keydown', (e) => {
        if (e.target.classList.contains('conversation-title') && e.target.contentEditable === 'true') {
          if (e.key === 'Enter') {
            e.preventDefault();
            e.target.blur();
          }
          if (e.key === 'Escape') {
            const id = e.target.dataset.editId;
            const conv = conversations.find(c => c.id === id);
            e.target.textContent = conv?.title || '';
            e.target.blur();
          }
        }
      }, true);

      drawerList.querySelectorAll('.conv-action-btn.delete').forEach(btn => {
        btn.addEventListener('click', (e) => {
          e.stopPropagation();
          if (confirm('¿Eliminar esta conversación?')) {
            deleteConversation(btn.dataset.id);
          }
        });
      });
    }

    function toggleDrawer() {
      drawer.classList.toggle('open');
      drawerOverlay.classList.toggle('open');
      document.body.classList.toggle('drawer-open');
    }

    function closeDrawer() {
      drawer.classList.remove('open');
      drawerOverlay.classList.remove('open');
      document.body.classList.remove('drawer-open');
    }

    function clearMessagesUI() {
      messagesWrap.innerHTML = '';
      messagesWrap.appendChild(emptyState);
      emptyState.style.display = '';
    }

    function resetConversationDraft() {
      messages = [];
      currentConversationId = null;
      messagesWrap.innerHTML = '';
      messagesWrap.appendChild(emptyState);
      emptyState.style.display = '';
      chatInput.value = '';
      chatInput.style.height = 'auto';
      attachedImages = [];
      imageInput.value = '';
      imageCounter.textContent = '';
      renderImagePreview();
      updateSendBtn();
    }

    function renderMessages() {
      clearMessagesUI();
      if (messages.length === 0) {
        emptyState.style.display = '';
        return;
      }
      emptyState.style.display = 'none';
      messages.forEach(msg => {
        const displayContent = msg.role === 'user' && msg.imageCount
          ? `${msg.content}\n\n[${msg.imageCount} imagen${msg.imageCount > 1 ? 'es' : ''} adjunta${msg.imageCount > 1 ? 's' : ''}]`
          : msg.content;
        appendMessage(msg.role, displayContent, msg.model);
      });
    }

    marked.use({
      breaks: true,
      gfm: true,
      renderer: (() => {
        const r = new marked.Renderer();
        r.code = (code, lang) => {
          const validLang = lang && hljs.getLanguage(lang) ? lang : null;
          const highlighted = validLang
            ? hljs.highlight(code, { language: validLang }).value
            : hljs.highlightAuto(code).value;
          const detectedLang = validLang || 'auto';
          return `<div class="code-block-wrap">
        <div class="code-block-header">
          <span class="code-lang">${detectedLang}</span>
          <button class="code-copy-btn" onclick="copyCode(this)" aria-label="Copiar código">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
            Copiar
          </button>
        </div>
        <pre><code class="hljs language-${detectedLang}">${highlighted}</code></pre>
      </div>`;
        };
        return r;
      })()
    });

    function copyCode(btn) {
      const code = btn.closest('.code-block-wrap').querySelector('code').innerText;
      navigator.clipboard.writeText(code).then(() => {
        btn.classList.add('copied');
        btn.innerHTML = `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M20 6L9 17l-5-5"/></svg> Copiado`;
        setTimeout(() => {
          btn.classList.remove('copied');
          btn.innerHTML = `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg> Copiar`;
        }, 2000);
      });
    }

    function buildDropdown() {
      dropdownBody.innerHTML = '';
      MODELS.forEach(m => {
        const p = PROVIDERS.find(pp => pp.id === m.provider);
        const opt = document.createElement('div');
        opt.className = 'model-option' + (selectedModel?.id === m.id ? ' selected' : '');
        opt.dataset.provider = m.provider;
        opt.dataset.model = m.id;
        opt.dataset.label = m.label.toLowerCase();
        opt.setAttribute('role', 'option');
        opt.tabIndex = 0;
        opt.innerHTML = `<span class="opt-dot" style="background:${p.color}"></span><span class="opt-name">${m.label}</span><span class="opt-tag">${m.tag}</span>`;
        opt.addEventListener('click', () => selectModel(m));
        opt.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); selectModel(m); } });
        dropdownBody.appendChild(opt);
      });
    }

    function selectModel(m) {
      selectedModel = m;
      const p = PROVIDERS.find(pp => pp.id === m.provider);
      const iconEl = modelBtn.querySelector('[data-lucide="brain"]');
      if (iconEl) iconEl.style.color = p.color;
      modelLabel.textContent = `${p.name} · ${m.label}`;
      closeDropdown();
      buildDropdown();
      updateSendBtn();
    }

    function openDropdown() {
      modelDropdown.classList.add('open');
      modelBtn.setAttribute('aria-expanded', 'true');
      setTimeout(() => modelSearch.focus(), 60);
      modelSearch.value = '';
      filterModels('');
    }
    function closeDropdown() {
      modelDropdown.classList.remove('open');
      modelBtn.setAttribute('aria-expanded', 'false');
    }

    modelBtn.addEventListener('click', () => modelDropdown.classList.contains('open') ? closeDropdown() : openDropdown());
    document.addEventListener('click', e => { if (!modelBtn.contains(e.target) && !modelDropdown.contains(e.target)) closeDropdown(); });
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeDropdown(); });
    modelSearch.addEventListener('input', () => filterModels(modelSearch.value.trim().toLowerCase()));

    function filterModels(q) {
      dropdownBody.querySelectorAll('.model-option').forEach(opt => {
        const match = !q || opt.dataset.label.includes(q) || opt.dataset.provider.includes(q);
        opt.classList.toggle('hidden', !match);
      });
    }

    chatInput.addEventListener('input', () => {
      chatInput.style.height = 'auto';
      chatInput.style.height = Math.min(chatInput.scrollHeight, 200) + 'px';
      const l = chatInput.value.length;
      charCounter.textContent = l > 60 ? `${l}` : '';
      updateSendBtn();
    });
    chatInput.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleSend(); }
    });
    chatInput.addEventListener('paste', async e => {
      const files = [...(e.clipboardData?.files || [])].filter(file => file.type.startsWith('image/'));
      if (files.length) await addImageFiles(files);
    });
    function updateSendBtn() {
      sendBtn.disabled = isLoading || (!chatInput.value.trim() && attachedImages.length === 0) || !selectedModel;
    }

    imageBtn.addEventListener('click', () => imageInput.click());
    imageInput.addEventListener('change', async () => {
      await addImageFiles([...imageInput.files]);
      imageInput.value = '';
    });

    async function addImageFiles(files) {
      const availableSlots = MAX_IMAGES - attachedImages.length;
      const images = await Promise.all(files.filter(file => file.type.startsWith('image/')).slice(0, availableSlots).map(fileToDataUrl));
      attachedImages = [...attachedImages, ...images];
      if (files.length > availableSlots) showToast(`Máximo ${MAX_IMAGES} imágenes por envío`);
      renderImagePreview();
      updateSendBtn();
    }

    function renderImagePreview() {
      imageCounter.textContent = attachedImages.length ? `${attachedImages.length} imagen${attachedImages.length > 1 ? 'es' : ''}` : '';
      imagePreview.innerHTML = attachedImages.map((image, index) => `
        <button class="image-preview-item" type="button" data-index="${index}" title="Quitar imagen">
          <img src="${image}" alt="Imagen adjunta ${index + 1}">
        </button>
      `).join('');
    }

    imagePreview.addEventListener('click', e => {
      const item = e.target.closest('.image-preview-item');
      if (!item) return;
      attachedImages.splice(Number(item.dataset.index), 1);
      renderImagePreview();
      updateSendBtn();
    });

    function fileToDataUrl(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result);
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }

    document.querySelectorAll('.hint-chip').forEach(c => {
      c.addEventListener('click', () => {
        chatInput.value = c.dataset.prompt;
        chatInput.dispatchEvent(new Event('input'));
        chatInput.focus();
      });
    });

    document.getElementById('clearBtn').addEventListener('click', () => {
      if (currentConversationId && messages.length > 0) {
        const conv = conversations.find(c => c.id === currentConversationId);
        updateConversation(currentConversationId, conv?.title || 'Nueva conversación', messages);
      }
      resetConversationDraft();
    });

    sendBtn.addEventListener('click', handleSend);

    async function handleSend() {
      const text = chatInput.value.trim();
      const images = attachedImages;
      if ((!text && images.length === 0) || isLoading || !selectedModel) return;

      if (!currentConversationId) {
        createConversation();
      }

      emptyState.style.display = 'none';
      const userText = text || '[Imagen adjunta]';
      messages.push({ role: 'user', content: userText, imageCount: images.length });
      appendMessage('user', images.length ? `${userText}\n\n[${images.length} imagen${images.length > 1 ? 'es' : ''} adjunta${images.length > 1 ? 's' : ''}]` : userText);
      chatInput.value = '';
      chatInput.style.height = 'auto';
      attachedImages = [];
      imageInput.value = '';
      imageCounter.textContent = '';
      renderImagePreview();
      charCounter.textContent = '';
      isLoading = true;
      updateSendBtn();

      const typing = appendTyping();
      try {
        const reply = await callProvider(selectedModel.provider, selectedModel.id, messages, images);
        typing.remove();
        messages.push({ role: 'assistant', content: reply, model: selectedModel });
        appendMessage('assistant', reply, selectedModel);
        
        const conv = conversations.find(c => c.id === currentConversationId);
        if (conv) {
          const title = messages[0]?.content?.substring(0, 50) || 'Nueva conversación';
          conv.title = title + (title.length >= 50 ? '…' : '');
          updateConversation(currentConversationId, conv.title, messages);
          renderConversations(conversationSearch.value.trim());
        }
      } catch (err) {
        typing.remove();
        showToast(` ${err.message}`);
        messages.pop();
        appendMessage('assistant', `**Error:** ${err.message}`, selectedModel);
      } finally {
        isLoading = false;
        updateSendBtn();
      }
    }

    async function callProvider(provider, model, msgs, images = []) {
      const res = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          provider,
          model,
          messages: msgs.map(({ role, content }) => ({ role, content })),
          images
        })
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data?.error?.message || data?.error || data?.message || `HTTP ${res.status}`);
      return data.content || '';
    }

    function appendMessage(role, content, model) {
      const wrap = document.createElement('div');
      wrap.className = `msg ${role}`;
      const meta = document.createElement('div');
      meta.className = 'msg-meta';
      if (role === 'assistant' && model) {
        const p = PROVIDERS.find(pp => pp.id === model.provider);
        meta.innerHTML = p
          ? `<span style="color:${p.color}">●</span> ${p.name} · ${model.label}`
          : `Asistente · ${model.label || model.id || 'Modelo'}`;
      } else if (role === 'assistant') {
        meta.textContent = 'Asistente';
      } else {
        meta.textContent = 'Tú';
      }
      const copyBtn = document.createElement('button');
      copyBtn.className = 'msg-copy-btn';
      copyBtn.innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>`;
      copyBtn.onclick = () => copyMessage(copyBtn, content);
      copyBtn.title = 'Copiar';
      meta.appendChild(copyBtn);
      const bubble = document.createElement('div');
      bubble.className = 'msg-bubble';
      if (role === 'assistant') {
        const md = document.createElement('div');
        md.className = 'md-content';
        md.innerHTML = marked.parse(content);
        bubble.appendChild(md);

        const topBtn = document.createElement('button');
        topBtn.className = 'response-top-btn';
        topBtn.type = 'button';
        topBtn.title = 'Ir al inicio de esta respuesta';
        topBtn.setAttribute('aria-label', 'Ir al inicio de esta respuesta');
        topBtn.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.25"><path d="M12 19V5"/><path d="M5 12l7-7 7 7"/></svg>';
        topBtn.onclick = () => wrap.scrollIntoView({ behavior: 'smooth', block: 'start' });
        bubble.appendChild(topBtn);
      } else {
        bubble.textContent = content;
      }
      wrap.appendChild(meta);
      wrap.appendChild(bubble);
      messagesWrap.appendChild(wrap);
      messagesWrap.scrollTop = messagesWrap.scrollHeight;
      return wrap;
    }

    function copyMessage(btn, content) {
      navigator.clipboard.writeText(content).then(() => {
        btn.classList.add('copied');
        btn.innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M20 6L9 17l-5-5"/></svg>`;
        setTimeout(() => {
          btn.classList.remove('copied');
          btn.innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>`;
        }, 2000);
      });
    }

    function appendTyping() {
      const wrap = document.createElement('div');
      wrap.className = 'msg assistant';
      const meta = document.createElement('div');
      meta.className = 'msg-meta';
      if (selectedModel) {
        const p = PROVIDERS.find(pp => pp.id === selectedModel.provider);
        meta.innerHTML = `<span style="color:${p.color}">●</span> ${p.name} · ${selectedModel.label}`;
      }
      const ind = document.createElement('div');
      ind.className = 'typing-indicator';
      ind.innerHTML = '<div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div>';
      wrap.appendChild(meta);
      wrap.appendChild(ind);
      messagesWrap.appendChild(wrap);
      messagesWrap.scrollTop = messagesWrap.scrollHeight;
      return wrap;
    }

    const themeBtn = document.getElementById('themeBtn');
    const hljsDark = document.getElementById('hljs-dark');
    const hljsLight = document.getElementById('hljs-light');

    themeBtn.addEventListener('click', () => {
      document.documentElement.style.transition = 'background-color 300ms ease, color 300ms ease';
      currentTheme = currentTheme === 'dark' ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', currentTheme);
      hljsDark.disabled = currentTheme !== 'dark';
      hljsLight.disabled = currentTheme !== 'light';
      themeBtn.style.transform = 'rotate(180deg)';
      themeBtn.innerHTML = currentTheme === 'dark'
        ? '<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>'
        : '<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>';
      setTimeout(() => {
        themeBtn.style.transform = 'rotate(0deg)';
      }, 300);
    });

    let toastTimer;
    function showToast(msg) {
      toastEl.textContent = msg;
      toastEl.classList.add('show');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => toastEl.classList.remove('show'), 5000);
    }

    drawerBtn.addEventListener('click', toggleDrawer);
    drawerOverlay.addEventListener('click', closeDrawer);
    closeDrawerBtn.addEventListener('click', closeDrawer);
    newChatBtn.addEventListener('click', () => {
      resetConversationDraft();
      closeDrawer();
    });
    conversationSearch.addEventListener('input', () => renderConversations(conversationSearch.value.trim()));

    const p = PROVIDERS.find(pp => pp.id === selectedModel.provider);
    modelLabel.textContent = `${p.name} · ${selectedModel.label}`;
    buildDropdown();
    updateSendBtn();
    
    if (window.lucide) {
      lucide.createIcons();
      const iconEl = document.getElementById('modelIcon');
      if (iconEl) iconEl.style.color = p.color;
    }

    initDB();
  </script>
</body>
